services:
  app:
    build: .
    env_file: .env
    environment:
      # Override localhost → docker service name for in-container networking
      REDIS_HOST: redis
    ports:
      - "${PORT:-7000}:${PORT:-7000}"
    volumes:
      - uploads:/data/uploads
      - outputs:/data/outputs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  uploads:
  outputs:
  redis_data:
